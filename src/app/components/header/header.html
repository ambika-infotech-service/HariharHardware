<nav class="modern-navbar" role="navigation">
  <div class="navbar-container">
    <!-- Brand Logo -->
    <a class="brand-logo" routerLink="/" aria-label="Harihar Hardware & Paints Home">
      <img
        class="brand-logo-image"
        ngSrc="/logo.png"
        width="50"
        height="50"
        alt="Harihar Hardware & Paints"
        priority
      />
      <span class="brand-text">Harihar Hardware & Paints</span>
    </a>

    <!-- Mobile Menu Toggle -->
    <button
      class="mobile-menu-toggle"
      type="button"
      (click)="toggleMobileMenu()"
      [class.active]="mobileMenuOpen"
      [attr.aria-expanded]="mobileMenuOpen"
      aria-label="Toggle navigation menu"
    >
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>

    <!-- Navigation Menu -->
    <div class="nav-menu" [class.active]="mobileMenuOpen">
      <ul class="nav-links" role="list">
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            (click)="closeMobileMenu()"
          >
            <span class="nav-link-text">{{ translate('nav.home') }}</span>
            <span class="nav-link-indicator"></span>
          </a>
        </li>
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/products"
            routerLinkActive="active"
            (click)="closeMobileMenu()"
          >
            <span class="nav-link-text">{{ translate('nav.products') }}</span>
            <span class="nav-link-indicator"></span>
          </a>
        </li>
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/about"
            routerLinkActive="active"
            (click)="closeMobileMenu()"
          >
            <span class="nav-link-text">{{ translate('nav.about') }}</span>
            <span class="nav-link-indicator"></span>
          </a>
        </li>
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/faq"
            routerLinkActive="active"
            (click)="closeMobileMenu()"
          >
            <span class="nav-link-text">{{ translate('nav.faq') }}</span>
            <span class="nav-link-indicator"></span>
          </a>
        </li>
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/contact"
            routerLinkActive="active"
            (click)="closeMobileMenu()"
          >
            <span class="nav-link-text">{{ translate('nav.contact') }}</span>
            <span class="nav-link-indicator"></span>
          </a>
        </li>
      </ul>

      <!-- Language Selector -->
      <div class="language-selector" role="group" aria-label="Language selection">
        <button
          type="button"
          class="lang-btn"
          [class.active]="language() === 'en'"
          (click)="setLanguage('en')"
          aria-label="Switch to English"
        >
          EN
        </button>
        <button
          type="button"
          class="lang-btn"
          [class.active]="language() === 'gu'"
          (click)="setLanguage('gu')"
          aria-label="ગુજરાતીમાં બદલો"
        >
          ગુ
        </button>
        <button
          type="button"
          class="lang-btn"
          [class.active]="language() === 'hi'"
          (click)="setLanguage('hi')"
          aria-label="हिंदी में बदलें"
        >
          हि
        </button>
        <button
          type="button"
          class="lang-btn"
          [class.active]="language() === 'mr'"
          (click)="setLanguage('mr')"
          aria-label="मराठीत बदला"
        >
          म
        </button>
      </div>
    </div>
  </div>
</nav>
